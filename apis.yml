apis:
  - aid: spanning:spanning-google-workspace-api
    name: Spanning Backup for Google Workspace API
    description: >-
      RESTful API for managing Spanning Backup for Google Workspace. Supports user license
      management (assign, unassign, list, get), shared drives backup management (list,
      export), and export operations (initiate, list, get). Authentication uses API tokens
      obtained from the Spanning admin portal Settings tab.
    humanURL: https://spanning.com/products/google-workspace-backup/
    baseURL: https://api.spanningbackup.com
